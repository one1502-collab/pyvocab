<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyVocab — Python 编程英语词卡</title>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#25253d;
  --accent:#7c5cfc;--accent2:#ff6b6b;--accent3:#4ecdc4;--accent4:#ffd93d;
  --text:#e8e8f0;--text2:#9999b3;
  --radius:16px;--glow:0 0 30px rgba(124,92,252,.25);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.page{display:none;animation:fadeUp .4s ease}.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes comboPop{0%{transform:scale(1)}50%{transform:scale(1.6)}100%{transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes particle{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}
@keyframes nodePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,217,61,.5)}50%{box-shadow:0 0 0 14px rgba(255,217,61,0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.container{max-width:900px;margin:0 auto;padding:20px 16px 100px;}
.glass{background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#6a4ce0;box-shadow:var(--glow);transform:translateY(-2px)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{border-color:var(--accent);transform:translateY(-2px)}
.btn-danger{background:var(--accent2);color:#fff}
.btn-sm{padding:8px 18px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.topbar{position:sticky;top:0;z-index:100;background:rgba(15,15,26,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-score{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--accent4)}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,.06);transition:all .25s}
.topbar-user:hover{background:rgba(255,255,255,.1)}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:14px}
.user-menu{position:absolute;top:50px;right:10px;background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;min-width:150px;display:none;z-index:200}
.user-menu.show{display:block}
.user-menu-item{padding:10px 14px;cursor:pointer;border-radius:8px;font-size:13px;transition:all .2s}
.user-menu-item:hover{background:rgba(255,255,255,.08)}

.navbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,15,26,.9);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,8px)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 16px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .25s;border-radius:10px}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--accent)}
.nav-item .icon{font-size:22px;transition:transform .25s}
.nav-item.active .icon{transform:scale(1.15)}

/* 登录页 */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{max-width:380px;width:100%;text-align:center;padding:40px 30px;border-radius:20px;background:var(--bg2);border:1px solid rgba(255,255,255,.08)}
.login-logo{font-size:64px;margin-bottom:16px}
.login-title{font-size:28px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-desc{font-size:14px;color:var(--text2);margin-bottom:32px}
.login-form{display:flex;flex-direction:column;gap:12px}
.login-input{background:var(--bg3);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 18px;font-size:15px;color:var(--text);outline:none;transition:all .3s;text-align:center}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(124,92,252,.2)}
.login-input::placeholder{color:var(--text2)}
.login-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text2);font-size:12px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.login-error{font-size:13px;color:var(--accent2);background:rgba(255,107,107,.1);padding:10px;border-radius:8px;margin-bottom:12px;display:none}
.login-loading{display:none;align-items:center;justify-content:center;gap:8px;font-size:14px;color:var(--text2)}

/* ══ 首页地图 ══ */
.hero{text-align:center;padding:32px 0 12px}
.hero h1{font-size:30px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent3),var(--accent4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hero p{color:var(--text2);font-size:14px}
.stats-row{display:flex;gap:10px;margin:20px 0;justify-content:center;flex-wrap:wrap}
.stat-card{padding:14px 20px;text-align:center;border-radius:14px;min-width:90px}
.stat-card .val{font-size:24px;font-weight:800;display:inline-block}
.stat-card .label{font-size:11px;color:var(--text2);margin-top:2px}

.map-container{position:relative;padding:10px 0 20px}
.map-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.map-node{position:relative;z-index:1;display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:16px;background:var(--bg2);border:2px solid rgba(255,255,255,.06);cursor:pointer;transition:all .35s;margin-bottom:12px}
.map-node:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--glow)}
.map-node.locked{opacity:.4;cursor:not-allowed;filter:grayscale(.5)}
.map-node.locked:hover{transform:none;border-color:rgba(255,255,255,.06);box-shadow:none}
.map-node.current{border-color:var(--accent4);animation:nodePulse 2s infinite}
.map-node.completed{border-color:var(--accent3);background:rgba(78,205,196,.06)}
.map-node.completed:hover{border-color:var(--accent3)}
.node-num{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.map-node.completed .node-num{background:var(--accent3);color:#fff}
.map-node.current .node-num{background:var(--accent4);color:#1a1a2e;animation:float 2.5s ease-in-out infinite}
.map-node.locked .node-num{background:var(--bg3);color:var(--text2)}
.map-node:not(.completed):not(.current):not(.locked) .node-num{background:rgba(124,92,252,.2);color:var(--accent)}
.node-icon{font-size:30px;flex-shrink:0}
.node-info{flex:1;min-width:0}
.node-info h3{font-size:15px;font-weight:700;margin-bottom:2px}
.node-info p{font-size:12px;color:var(--text2)}
.node-info .desc{font-size:11px;color:var(--text2);margin-top:2px;font-style:italic}
.node-progress{height:4px;background:rgba(255,255,255,.08);border-radius:4px;margin-top:6px;overflow:hidden}
.node-progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .6s ease}
.map-node.completed .node-progress-bar{background:var(--accent3)}
.map-node.current .node-progress-bar{background:linear-gradient(90deg,var(--accent4),var(--accent))}
.node-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.badge-done{background:rgba(78,205,196,.15);color:var(--accent3)}
.badge-progress{background:rgba(255,217,61,.12);color:var(--accent4)}
.badge-locked{background:rgba(255,255,255,.06);color:var(--text2)}

/* ══ 学习页：合一卡片 ══ */
.learn-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.learn-top h2{font-size:20px;font-weight:700}
.counter{font-size:13px;color:var(--text2);font-weight:600}

.word-card{max-width:440px;margin:0 auto 16px;border-radius:var(--radius);overflow:hidden;background:var(--bg2);border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 40px rgba(0,0,0,.3)}

.card-head{padding:28px 24px 16px;text-align:center;position:relative}
.card-head .word{font-size:40px;font-weight:900;letter-spacing:2px}
.card-head .phonetic{font-size:15px;color:var(--accent3);margin-top:4px}
.card-head .speak-btn{background:rgba(124,92,252,.2);border:1px solid rgba(124,92,252,.3);color:var(--accent);width:44px;height:44px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .25s;margin-top:10px}
.card-head .speak-btn:hover{background:var(--accent);color:#fff;transform:scale(1.1)}
.card-head .speak-btn.speaking{animation:pulse 1s infinite}

.card-body{padding:0 24px 24px}
.card-section{margin-bottom:14px;animation:slideUp .3s ease}
.card-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:4px}
.card-section .chinese{font-size:22px;font-weight:700;color:var(--accent3)}
.card-section .role{font-size:14px;color:var(--text);line-height:1.5;padding:10px 14px;background:rgba(124,92,252,.08);border-radius:10px;border-left:3px solid var(--accent)}
.card-section .example{font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;background:rgba(0,0,0,.3);padding:12px 14px;border-radius:10px;color:#c8d6e5;line-height:1.6;white-space:pre-wrap;border:1px solid rgba(78,205,196,.12)}

.spell-section{padding:0 24px 20px;border-top:1px solid rgba(255,255,255,.06);padding-top:16px}
.spell-section .label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
.spell-row{display:flex;gap:10px;align-items:center}
.spell-input{flex:1;background:var(--bg3);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px;font-size:20px;text-align:center;color:var(--text);outline:none;transition:all .3s;font-family:'Cascadia Code','Fira Code',monospace;letter-spacing:3px}
.spell-input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(124,92,252,.2)}
.spell-input.correct{border-color:var(--accent3);background:rgba(78,205,196,.1);color:var(--accent3)}
.spell-input.wrong{border-color:var(--accent2);background:rgba(255,107,107,.1);color:var(--accent2);animation:shake .4s ease}
.spell-check-btn{width:44px;height:44px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-size:18px;cursor:pointer;transition:all .25s;flex-shrink:0}
.spell-check-btn:hover{background:#6a4ce0;transform:scale(1.05)}
.spell-result{font-size:12px;margin-top:6px;height:16px}
.spell-result.ok{color:var(--accent3)}
.spell-result.fail{color:var(--accent2)}

.listen-section{padding:0 24px 24px;border-top:1px solid rgba(255,255,255,.06);padding-top:16px}
.listen-section .label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
.listen-row{display:flex;gap:10px;align-items:center}
.listen-input{flex:1;background:var(--bg3);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px;font-size:20px;text-align:center;color:var(--text);outline:none;transition:all .3s;font-family:'Cascadia Code','Fira Code',monospace;letter-spacing:3px}
.listen-input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(124,92,252,.2)}
.listen-input.correct{border-color:var(--accent3);background:rgba(78,205,196,.1);color:var(--accent3)}
.listen-input.wrong{border-color:var(--accent2);background:rgba(255,107,107,.1);color:var(--accent2);animation:shake .4s ease}
.listen-play-btn{width:44px;height:44px;border-radius:50%;background:rgba(78,205,196,.15);border:1px solid rgba(78,205,196,.3);color:var(--accent3);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.listen-play-btn:hover{background:var(--accent3);color:#fff;transform:scale(1.1)}
.listen-play-btn.speaking{animation:pulse 1s infinite}
.listen-check-btn{width:44px;height:44px;border-radius:12px;background:var(--accent3);color:#fff;border:none;font-size:18px;cursor:pointer;transition:all .25s;flex-shrink:0}
.listen-check-btn:hover{transform:scale(1.05)}
.listen-result{font-size:12px;margin-top:6px;height:16px}
.listen-result.ok{color:var(--accent3)}
.listen-result.fail{color:var(--accent2)}

.learn-actions{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px}
.learn-actions .btn{min-width:130px;justify-content:center}

.combo-display{position:fixed;top:76px;right:16px;z-index:200;font-size:28px;font-weight:900;color:var(--accent4);opacity:0;transition:all .3s;pointer-events:none}
.combo-display.active{opacity:1}
.combo-display.pop{animation:comboPop .3s ease}
#particles{position:fixed;inset:0;pointer-events:none;z-index:150}
.particle{position:absolute;border-radius:50%;animation:particle .8s ease forwards}

.review-empty{text-align:center;padding:60px 20px;color:var(--text2)}
.review-empty .icon{font-size:64px;margin-bottom:16px}
.review-list{display:grid;gap:10px;margin-top:16px}
.review-item{display:flex;align-items:center;gap:14px;padding:14px 18px}
.review-item .word{font-weight:700;font-size:15px;flex:1}
.review-item .err-count{font-size:11px;color:var(--accent2);background:rgba(255,107,107,.12);padding:3px 10px;border-radius:8px}
.review-item .btn{flex-shrink:0}

.profile-header{text-align:center;padding:28px 0 16px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px;animation:float 3s ease-in-out infinite}
.profile-name{font-size:20px;font-weight:700}
.profile-level{font-size:13px;color:var(--accent4);margin-top:4px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:16px}
.badge-card{padding:12px;text-align:center;border-radius:12px;background:var(--bg3);border:1px solid rgba(255,255,255,.06);transition:all .3s}
.badge-card.earned{border-color:var(--accent4);background:rgba(255,217,61,.06)}
.badge-card .icon{font-size:26px;margin-bottom:4px}
.badge-card .name{font-size:12px;font-weight:600}
.badge-card .desc{font-size:10px;color:var(--text2);margin-top:2px}
.daily-task{margin-top:20px}
.daily-task h3{font-size:15px;font-weight:700;margin-bottom:10px}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:var(--bg3);margin-bottom:6px}
.task-item .check{width:20px;height:20px;border-radius:50%;border:2px solid var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all .3s}
.task-item.done .check{background:var(--accent3);border-color:var(--accent3);color:#fff}
.task-item .info{flex:1}
.task-item .info .tname{font-size:13px;font-weight:600}
.task-item .info .tdesc{font-size:11px;color:var(--text2)}
.task-item .treward{font-size:12px;font-weight:700;color:var(--accent4)}

@media(max-width:600px){
  .hero h1{font-size:24px}
  .card-head .word{font-size:32px}
  .stats-row{gap:6px}
  .stat-card{padding:10px 14px;min-width:76px}
  .stat-card .val{font-size:20px}
  .container{padding:14px 10px 100px}
  .spell-row,.listen-row{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ====== 登录页 ====== -->
<div class="page" id="pageLogin">
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🐍</div>
      <div class="login-title">PyVocab</div>
      <div class="login-desc">登录后同步你的学习进度</div>
      <div class="login-error" id="loginError"></div>
      <div class="login-form">
        <input class="login-input" id="loginEmail" type="email" placeholder="邮箱地址" autocomplete="email">
        <input class="login-input" id="loginPassword" type="password" placeholder="密码（至少6位）" autocomplete="new-password">
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="handleLogin()">
          <span id="loginBtnText">登录 / 注册</span>
        </button>
        <div class="login-divider">或者</div>
        <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="handleGitHubLogin()">
          <span>🔗 GitHub 登录</span>
        </button>
      </div>
      <div class="login-loading" id="loginLoading">
        <span style="animation:pulse 1s infinite">⏳</span> 正在登录...
      </div>
    </div>
  </div>
</div>

<div class="topbar" id="mainTopbar" style="display:none">
  <div class="topbar-title">PyVocab</div>
  <div class="topbar-right">
    <div class="topbar-score">⭐ <span id="topScore">0</span></div>
    <div class="topbar-user" onclick="toggleUserMenu()">
      <div class="topbar-avatar" id="topbarAvatar">👤</div>
      <span id="topbarUsername">用户</span>
    </div>
    <div class="user-menu" id="userMenu">
      <div class="user-menu-item" onclick="handleLogout()">🚪 退出登录</div>
    </div>
  </div>
</div>
<div class="combo-display" id="comboDisplay"></div>
<div id="particles"></div>

<!-- ====== 首页 ====== -->
<div class="page" id="pageHome">
  <div class="container">
    <div class="hero"><h1>🐍 Python 英语词卡</h1><p>从最简单的开始，一步步掌握编程英语</p></div>
    <div class="stats-row" id="statsRow"></div>
    <div style="text-align:center;margin:16px 0">
      <button class="btn btn-primary" onclick="selectDictCategory()" style="min-width:200px">🎧 开始听写测试</button>
    </div>
    <div class="map-container" id="mapContainer"></div>
  </div>
</div>

<!-- ====== 学习页 ====== -->
<div class="page" id="pageLearn">
  <div class="container">
    <div class="learn-top">
      <h2 id="learnTitle">学习</h2>
      <span class="counter" id="learnCounter">0/0</span>
    </div>
    <div style="text-align:center;margin-bottom:12px">
      <span style="display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(124,92,252,.15);color:var(--accent);border:1px solid rgba(124,92,252,.3)">📖 学习阶段</span>
    </div>
    <div class="word-card" id="wordCard">
      <div class="card-head">
        <div class="word" id="cardWord"></div>
        <div class="phonetic" id="cardPhonetic"></div>
        <button class="speak-btn" id="speakBtn" onclick="speakWord()" title="发音">🔊</button>
      </div>
      <div class="card-body">
        <div class="card-section">
          <div class="card-section-label">中文释义</div>
          <div class="chinese" id="cardChinese"></div>
        </div>
        <div class="card-section">
          <div class="card-section-label">Python 中的作用</div>
          <div class="role" id="cardRole"></div>
        </div>
        <div class="card-section">
          <div class="card-section-label">代码示例</div>
          <div class="example" id="cardExample"></div>
        </div>
      </div>
      <div class="spell-section">
        <div class="label">✏️ 拼写练习</div>
        <div class="spell-row">
          <input class="spell-input" id="spellInput" autocomplete="off" placeholder="输入单词…" onkeydown="if(event.key==='Enter')checkSpell()">

async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadCloudProgress();
    showMainApp();
  } else {
    showLoginPage();
  }
  
  // 监听认证状态变化
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      await loadCloudProgress();
      showMainApp();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      cloudProgress = {};
      showLoginPage();
    }
  });
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  const loadingEl = document.getElementById('loginLoading');
  const btnText = document.getElementById('loginBtnText');
  
  if (!email || !password) {
    errorEl.textContent = '请输入邮箱和密码';
    errorEl.style.display = 'block';
    return;
  }
  
  if (password.length < 6) {
    errorEl.textContent = '密码至少6位';
    errorEl.style.display = 'block';
    return;
  }
  
  errorEl.style.display = 'none';
  loadingEl.style.display = 'flex';
  btnText.textContent = '登录中...';
  
  // 先尝试登录
  let { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  // 如果登录失败，尝试注册
  if (error) {
    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ 
      email, 
      password,
      options: { emailRedirectTo: window.location.origin }
    });
    
    if (signUpError) {
      errorEl.textContent = signUpError.message;
      errorEl.style.display = 'block';
      loadingEl.style.display = 'none';
      btnText.textContent = '登录 / 注册';
      return;
    }
    
    // 注册成功
    if (signUpData.user && !signUpData.session) {
      errorEl.textContent = '注册成功！请检查邮箱验证后登录';
      errorEl.style.display = 'block';
      errorEl.style.background = 'rgba(78,205,196,.1)';
      errorEl.style.color = 'var(--accent3)';
    }
  }
  
  loadingEl.style.display = 'none';
  btnText.textContent = '登录 / 注册';
}

// ====== 云端进度存储 ======
async function loadCloudProgress() {
  if (!currentUser) return;
  
  const { data, error } = await supabase
    .from('progress')
    .select('*')
    .eq('user_id', currentUser.id);
  
  if (error) {
    console.error('加载进度失败:', error);
    return;
  }
  
  cloudProgress = {};
  if (data) {
    data.forEach(item => {
      cloudProgress[item.word_id] = {
        mastered: item.mastered,
        wrong_count: item.wrong_count || 0,
        skip_count: item.skip_count || 0,
        score: item.score || 0
      };
    });
  }
}

async function saveCloudProgress(wordId, updates) {
  if (!currentUser) return;
  
  const existing = cloudProgress[wordId] || { mastered: false, wrong_count: 0, skip_count: 0, score: 0 };
  const newData = { ...existing, ...updates };
  
  const { error } = await supabase
    .from('progress')
    .upsert({
      user_id: currentUser.id,
      word_id: wordId,
      mastered: newData.mastered,
      wrong_count: newData.wrong_count,
      skip_count: newData.skip_count,
      score: newData.score,
      last_practice: new Date().toISOString()
    }, { onConflict: 'user_id,word_id' });
  
  if (error) {
    console.error('保存进度失败:', error);
  } else {
    cloudProgress[wordId] = newData;
  }
}

function getScore() {
  let total = 0;
  Object.values(cloudProgress).forEach(p => total += p.score || 0);
  return total;
}

function addScore(n, wordId) {
  if (!wordId) return;
  const existing = cloudProgress[wordId] || { mastered: false, wrong_count: 0, skip_count: 0, score: 0 };
  saveCloudProgress(wordId, { score: (existing.score || 0) + n });
}

function getMastered(categoryId) {
  const words = [];
  VOCAB.find(c => c.id === categoryId)?.words.forEach(w => {
    if (cloudProgress[w.word]?.mastered) words.push(w.word);
  });
  return words;
}

function addMastered(categoryId, word) {
  saveCloudProgress(word, { mastered: true });
}

function getErrors() {
  const errors = {};
  Object.entries(cloudProgress).forEach(([wordId, data]) => {
    if ((data.wrong_count > 0) || (data.skip_count > 0)) {
      errors[wordId] = { wrong: data.wrong_count, skipped: data.skip_count };
    }
  });
  return errors;
}

function addError(word, type = 'wrong') {
  const existing = cloudProgress[word] || { mastered: false, wrong_count: 0, skip_count: 0, score: 0 };
  if (type === 'wrong') {
    saveCloudProgress(word, { wrong_count: (existing.wrong_count || 0) + 1 });
  } else {
    saveCloudProgress(word, { skip_count: (existing.skip_count || 0) + 1 });
  }
}

function removeError(word) {
  saveCloudProgress(word, { wrong_count: 0, skip_count: 0 });
}

let voicesReady=false;
if('speechSynthesis' in window){
  if(speechSynthesis.getVoices().length>0)voicesReady=true;
  speechSynthesis.onvoiceschanged=()=>{voicesReady=true};
}
function speak(text,rate=1){
  if(!('speechSynthesis' in window))return null;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.volume=1;
  if(voicesReady){
    const voices=speechSynthesis.getVoices();
    const en=voices.find(v=>v.lang.startsWith('en'))||voices[0];
    if(en)u.voice=en;
  }
  setTimeout(()=>speechSynthesis.speak(u),50);
  return u;
}

    <div class="stat-card glass"><div class="val" style="color:var(--accent4)">${score}</div><div class="label">积分</div></div>
    <div class="stat-card glass"><div class="val" style="color:var(--accent2)">${totalErrors}</div><div class="label">错题</div></div>
    <div class="stat-card glass"><div class="val" style="color:var(--accent)">${getStreak()}</div><div class="label">连续天数</div></div>`;
  let currentCatId=null;
  for(let i=0;i<VOCAB.length;i++){const cat=VOCAB[i];if(score<cat.unlockScore)break;const m=getMastered(cat.id).length;if(m<cat.words.length){currentCatId=cat.id;break}if(i===VOCAB.length-1)currentCatId=cat.id}
  const map=document.getElementById('mapContainer');map.innerHTML='';
  const svgNS='http://www.w3.org/2000/svg',svg=document.createElementNS(svgNS,'svg');svg.setAttribute('class','map-svg');map.appendChild(svg);
  const nodes=[];
  VOCAB.forEach((cat,idx)=>{
    const mastered=getMastered(cat.id).length,total=cat.words.length,pct=Math.round(mastered/total*100);
    const locked=score<cat.unlockScore,isCurrent=cat.id===currentCatId,isCompleted=mastered===total&&!locked;
    const node=document.createElement('div');
    node.className=`map-node ${locked?'locked':isCurrent?'current':isCompleted?'completed':''}`.trim();
    node.innerHTML=`
      <div class="node-num">${locked?'🔒':isCompleted?'✓':idx+1}</div>
      <div class="node-icon">${cat.icon}</div>
      <div class="node-info">
        <h3>${cat.name}</h3><p class="desc">${cat.desc}</p>
        <p>${locked?`需 ${cat.unlockScore} 积分解锁`:`${total} 词 · 已掌握 ${mastered}`}</p>
        ${!locked?`<div class="node-progress"><div class="node-progress-bar" style="width:${pct}%"></div></div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
        <div class="node-badge ${isCompleted?'badge-done':isCurrent?'badge-progress':'badge-locked'}">${isCompleted?'完成':isCurrent?`${pct}%`:locked?'锁定':'0%'}</div>
        ${!locked?`<button class="btn btn-sm ${isCompleted?'btn-secondary':'btn-primary'}" onclick="event.stopPropagation();startDictationFromHome('${cat.id}')" style="min-width:70px;font-size:11px">${isCompleted?'🔄 复习':'🎧 去听写'}</button>`:''}
      </div>`;
    if(!locked)node.onclick=()=>startCategory(cat);
    map.appendChild(node);nodes.push(node);
  });
  requestAnimationFrame(()=>{
    svg.innerHTML='';const mR=map.getBoundingClientRect();
    svg.setAttribute('viewBox',`0 0 ${mR.width} ${mR.height}`);svg.style.width=mR.width+'px';svg.style.height=mR.height+'px';
    for(let i=0;i<nodes.length-1;i++){
      const aR=nodes[i].getBoundingClientRect(),bR=nodes[i+1].getBoundingClientRect();
      const x1=aR.left+aR.width/2-mR.left,y1=aR.bottom-mR.top,x2=bR.left+bR.width/2-mR.left,y2=bR.top-mR.top;
      const path=document.createElementNS(svgNS,'path');
      path.setAttribute('d',`M${x1},${y1} C${x1},${y1+30} ${x2},${y2-30} ${x2},${y2}`);
      path.setAttribute('fill','none');path.setAttribute('stroke-width','2');path.setAttribute('stroke-dasharray','6,6');
      const aOk=getMastered(VOCAB[i].id).length===VOCAB[i].words.length&&score>=VOCAB[i].unlockScore;
      path.setAttribute('stroke',aOk&&score>=VOCAB[i+1].unlockScore?'rgba(78,205,196,.4)':'rgba(255,255,255,.1)');
      svg.appendChild(path);
    }
  });
}

function startCategory(cat){
  currentCategory=cat;currentWords=[...cat.words];
  const mastered=getMastered(cat.id);
  const unmastered=currentWords.filter(w=>!mastered.includes(w.word));
  if(unmastered.length>0)currentWords=unmastered;
  for(let i=currentWords.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[currentWords[i],currentWords[j]]=[currentWords[j],currentWords[i]]}
  currentIdx=0;combo=0;
  document.getElementById('learnTitle').textContent=cat.name;
  switchPage('pageLearn');showCard();
}

  const w=currentWords[currentIdx];const inp=document.getElementById('spellInput');const res=document.getElementById('spellResult');

    if(!spellCorrect){

      addScore(5, w.word);const rect=inp.getBoundingClientRect();spawnParticles(rect.left+rect.width/2,rect.top);

      document.getElementById('spellRetryBtn').style.display='inline-flex';

    inp.className='spell-input wrong';res.textContent=`✗ 正确拼写: ${w.word}`;res.className='spell-result fail';
    addError(w.word,'wrong');setTimeout(()=>{inp.className='spell-input'},500);

    </button>`;
  });
  html+='</div><button class="btn btn-secondary" style="margin-top:20px" onclick="switchPage(\'pageHome\')">返回</button></div>';
  document.getElementById('pageDictation').innerHTML=html;
  switchPage('pageDictation');
}

function startDictation(categoryId){
  const cat=VOCAB.find(c=>c.id===categoryId);
  if(!cat){selectDictCategory();return;}
  currentDictCategory=cat;
  dictWords=[...cat.words];
  for(let i=dictWords.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [dictWords[i],dictWords[j]]=[dictWords[j],dictWords[i]];
  }
  dictIdx=0;dictResults=[];dictAnswered=false;
  restoreDictationPage();
  document.getElementById('dictSummary').style.display='none';
  document.getElementById('dictCard').style.display='block';
  document.getElementById('dictActions').style.display='none';
  showDictWord();
}

function restoreDictationPage(){
  document.getElementById('pageDictation').innerHTML=`
  <div class="container">
    <div class="learn-top">
      <h2 id="dictTitle">听写测试</h2>
      <span class="counter" id="dictCounter">0/0</span>
    </div>
    <div style="text-align:center;margin-bottom:12px">
      <span style="display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(78,205,196,.15);color:var(--accent3);border:1px solid rgba(78,205,196,.3)">👂 听写阶段 · <span id="dictCatName"></span></span>
    </div>
    <div class="word-card" id="dictCard">
      <div class="card-head" style="padding:28px 24px 12px">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">👂 听发音，根据 Python 作用写出单词</div>
        <div class="role" id="dictHint" style="text-align:left;margin-top:12px"></div>
      </div>
      <div style="padding:4px 24px 16px;display:flex;align-items:center;gap:12px">
        <button class="listen-play-btn" id="dictPlayBtn" onclick="playDict()" title="播放发音" style="width:52px;height:52px;font-size:24px">🔊</button>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">点击播放听发音<br>可重复播放</div>
      </div>
      <div class="listen-section" style="border-top:1px solid rgba(255,255,255,.06);padding-top:16px">
        <div class="label">写出你听到的单词</div>
        <div class="listen-row">
          <input class="listen-input" id="dictInput" autocomplete="off" placeholder="听音拼写…" onkeydown="if(event.key==='Enter')checkDict()">
          <button class="listen-check-btn" onclick="checkDict()" title="确认">✓</button>
        </div>
        <div class="listen-result" id="dictResult"></div>
        <button class="btn btn-sm btn-secondary" onclick="skipDict()" style="margin-top:10px;width:100%">⏭️ 跳过这题</button>
      </div>
      <div id="dictReveal" style="display:none;padding:0 24px 24px">
        <div class="card-section" style="margin-bottom:0">
          <div class="card-section-label">单词详情</div>
          <div style="font-size:28px;font-weight:900;letter-spacing:1px;margin:6px 0" id="dictRevealWord"></div>
          <div style="font-size:13px;color:var(--accent3)" id="dictRevealPhonetic"></div>
          <div style="font-size:16px;color:var(--accent3);margin-top:6px" id="dictRevealChinese"></div>
          <div style="font-size:13px;color:var(--text2);margin-top:8px;padding:10px 14px;background:rgba(124,92,252,.08);border-radius:10px;border-left:3px solid var(--accent)" id="dictRevealRole"></div>
          <div class="example" style="margin-top:8px" id="dictRevealExample"></div>
        </div>
      </div>
    </div>
    <div class="learn-actions" id="dictActions" style="display:none">
      <button class="btn btn-primary btn-sm" onclick="nextDict()">下一题 →</button>
    </div>
    <div id="dictSummary" style="display:none">
      <div style="text-align:center;padding:30px 0 20px">
        <div style="font-size:48px;margin-bottom:10px" id="dictSummaryEmoji">🎉</div>
        <div style="font-size:20px;font-weight:700" id="dictSummaryTitle">听写完成！</div>
        <div style="font-size:14px;color:var(--text2);margin-top:6px" id="dictSummaryDesc"></div>
      </div>
      <div id="dictSummaryList" style="display:grid;gap:8px;margin-top:16px"></div>
      <div style="text-align:center;margin-top:24px;display:flex;gap:12px;justify-content:center">
        <button class="btn btn-secondary btn-sm" onclick="switchPage('pageHome')">返回地图 🗺️</button>
        <button class="btn btn-primary btn-sm" onclick="retryDictation()">再来一次 🔄</button>
      </div>
    </div>
  </div>`;
}

function showDictWord(){
  if(dictIdx>=dictWords.length){showDictSummary();return;}
  const w=dictWords[dictIdx];
  dictAnswered=false;
  document.getElementById('dictCounter').textContent=`${dictIdx+1}/${dictWords.length}`;
  document.getElementById('dictTitle').textContent='听写测试';
  const catNameEl=document.getElementById('dictCatName');
  if(catNameEl&&currentDictCategory)catNameEl.textContent=currentDictCategory.name;
  document.getElementById('dictHint').textContent=w.pythonRole;
  document.getElementById('dictInput').value='';
  document.getElementById('dictInput').className='listen-input';
  document.getElementById('dictInput').disabled=false;
  document.getElementById('dictResult').textContent='';
  document.getElementById('dictReveal').style.display='none';
  document.getElementById('dictActions').style.display='none';
  setTimeout(()=>playDict(),300);
}

function playDict(){
  if(dictIdx>=dictWords.length)return;
  const w=dictWords[dictIdx];
  const btn=document.getElementById('dictPlayBtn');btn.classList.add('speaking');
  const u=speak(w.word,0.85);
  if(u){u.onend=()=>btn.classList.remove('speaking');u.onerror=()=>btn.classList.remove('speaking');}
  else setTimeout(()=>btn.classList.remove('speaking'),800);
}

function checkDict(){
  if(dictAnswered||dictIdx>=dictWords.length)return;
  const w=dictWords[dictIdx];
  const inp=document.getElementById('dictInput');
  const res=document.getElementById('dictResult');
  const correct=inp.value.trim().toLowerCase()===w.word.toLowerCase();
  dictAnswered=true;
  inp.disabled=true;
  if(correct){
    inp.className='listen-input correct';
    res.textContent='✓ 正确！';
    res.className='listen-result ok';
    addScore(10, w.word);
    dictResults.push({word:w.word,correct:true});
    spawnParticles(inp.getBoundingClientRect().left+inp.offsetWidth/2,inp.getBoundingClientRect().top);
    revealDictWord();
    setTimeout(()=>{
      if(dictIdx<dictWords.length-1){nextDict();}else{showDictSummary();}
    },1200);
  }else{
    inp.className='listen-input wrong';
    res.textContent='✗ 错误';
    res.className='listen-result fail';
    addError(w.word,'wrong');
    dictResults.push({word:w.word,correct:false});
    revealDictWord();
  }
}

function skipDict(){
  if(dictAnswered||dictIdx>=dictWords.length)return;
  const w=dictWords[dictIdx];
  dictAnswered=true;
  const inp=document.getElementById('dictInput');
  inp.disabled=true;
  inp.className='listen-input';
  document.getElementById('dictResult').textContent='⏭️ 已跳过';
  document.getElementById('dictResult').className='listen-result';
  addError(w.word,'skipped');
  dictResults.push({word:w.word,correct:false,skipped:true});
  revealDictWord();
}

function revealDictWord(){
  const w=dictWords[dictIdx];
  document.getElementById('dictRevealWord').textContent=w.word;
  document.getElementById('dictRevealPhonetic').textContent=w.phonetic;
  document.getElementById('dictRevealChinese').textContent=w.chinese;
  document.getElementById('dictRevealRole').textContent=w.pythonRole;
  document.getElementById('dictRevealExample').textContent=w.pythonExample;
  document.getElementById('dictReveal').style.display='block';
  document.getElementById('dictActions').style.display='flex';
}

function nextDict(){
  dictIdx++;
  showDictWord();
}

function showDictSummary(){
  document.getElementById('dictCard').style.display='none';
  document.getElementById('dictActions').style.display='none';
  const correctCount=dictResults.filter(r=>r.correct).length;
  const skippedCount=dictResults.filter(r=>r.skipped).length;
  const wrongCount=dictResults.length-correctCount-skippedCount;
  const total=dictResults.length;
  const allPassed=wrongCount===0&&skippedCount===0;
  
  if(allPassed&&currentDictCategory){
    currentDictCategory.words.forEach(w=>{
      const mastered=getMastered(currentDictCategory.id);
      if(!mastered.includes(w.word)){
        addMastered(currentDictCategory.id,w.word);
      }
    });
  }
  
  let emoji='💪',title='继续加油';
  if(allPassed){emoji='🏆';title='🎉 单元完成！';}
  else if(correctCount===total){emoji='👏';title='听写完成';}
  else if(correctCount>=total*0.7){emoji='👍';title='表现不错！';}
  
  document.getElementById('dictSummaryEmoji').textContent=emoji;
  document.getElementById('dictSummaryTitle').textContent=title;
  document.getElementById('dictSummaryDesc').textContent=`<span style="color:var(--accent3)">${correctCount}</span> 正确 · <span style="color:${skippedCount>0?'var(--text2)':'transparent'}">⏭ ${skippedCount} 跳过</span> · <span style="color:${wrongCount>0?'var(--accent2)':'transparent'}">✗ ${wrongCount} 错误</span>${allPassed&&currentDictCategory?'<br><span style="color:var(--accent4);font-size:14px">✨ 恭喜通过该单元！</span>':''}`;
  
  const reviewItems=dictResults.filter(r=>!r.correct);
  let listHtml='';
  if(reviewItems.length===0){
    listHtml='<div style="text-align:center;padding:20px;color:var(--text2)">🎉 全部正确！没有需要复习的词</div>';
  }else{
    listHtml+=`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">以下 ${reviewItems.length} 个词需要重点复习：</div>`;
    reviewItems.forEach((r)=>{
      const idx=dictResults.indexOf(r);
      const w=dictWords[idx];
      const icon=r.skipped?'⏭':'✗';
      const color=r.skipped?'var(--text2)':'var(--accent2)';
      listHtml+=`<div class="review-item glass" style="padding:12px 14px;display:block">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <span style="color:${color};font-weight:700;font-size:14px">${icon}</span>
          <span class="word" style="font-size:18px">${r.word}</span>
          <span style="font-size:12px;color:var(--text2)">${w.phonetic}</span>
        </div>
        <div style="font-size:13px;color:var(--accent3);margin-bottom:4px">${w.chinese}</div>
        <div style="font-size:11px;color:var(--text2);background:rgba(124,92,252,.08);padding:6px 10px;border-radius:6px;border-left:2px solid var(--accent)">${w.pythonRole}</div>
      </div>`;
    });
  }
  document.getElementById('dictSummaryList').innerHTML=listHtml;
  document.getElementById('dictSummary').style.display='block';
}

function retryDictation(){
  if(currentDictCategory){startDictation(currentDictCategory.id);}
  else{selectDictCategory();}
}

function markWord(known){
  const w=currentWords[currentIdx];
  if(known){
    combo++;const bonus=Math.min(combo-1,5)*2;addScore(10+bonus, w.word);
    const mastered=getMastered(currentCategory.id);
    const isFirstTime=!mastered.includes(w.word);
    if(isFirstTime){
      addMastered(currentCategory.id,w.word);
    }
    const rect=document.getElementById('wordCard').getBoundingClientRect();
    spawnParticles(rect.left+rect.width/2,rect.top+rect.height/2);
  }else{combo=0;addError(w.word,'wrong')}
  showCombo();
  currentIdx++;
  if(currentIdx>=currentWords.length){
    currentIdx=0;
    for(let i=currentWords.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [currentWords[i],currentWords[j]]=[currentWords[j],currentWords[i]];
    }
  }
  showCard();
}

/* 复习 */
function renderReview(){
  const errors=getErrors();
  const c=document.getElementById('reviewContent');
  const wrongWords=[];
  const skippedWords=[];
  Object.entries(errors).forEach(([word,counts])=>{
    let info=null;
    VOCAB.forEach(cat=>cat.words.forEach(w=>{if(w.word===word)info=w}));
    if((counts.wrong||0)>0) wrongWords.push({word,count:counts.wrong,info});
    if((counts.skipped||0)>0) skippedWords.push({word,count:counts.skipped,info});
  });
  if(!wrongWords.length&&!skippedWords.length){
    c.innerHTML='<div class="review-empty"><div class="icon">🎉</div><p>没有错题，继续保持！</p></div>';return;
  }
  let h='';
  if(wrongWords.length>0){
    h+=`<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:18px">✗</span>
        <h3 style="font-size:15px;font-weight:700;color:var(--accent2)">拼写错误</h3>
        <span style="font-size:12px;color:var(--text2);margin-left:auto">${wrongWords.length} 个词</span>
      </div>
      <div class="review-list">`;
    wrongWords.forEach(item=>{
      h+=`<div class="review-item glass">
        <div class="word">${item.word}${item.info?` <span style="color:var(--text2);font-size:12px">${item.info.chinese}</span>`:''}</div>
        <div class="err-count">错 ${item.count} 次</div>
        <button class="btn btn-sm btn-secondary" onclick="practiceError('${item.word}')">练习</button>
        <button class="btn btn-sm btn-danger" onclick="clearError('${item.word}')">清除</button>
      </div>`;
    });
    h+='</div></div>';
  }
  if(skippedWords.length>0){
    h+=`<div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:18px">⏭</span>
        <h3 style="font-size:15px;font-weight:700;color:var(--text2)">跳过不会</h3>
        <span style="font-size:12px;color:var(--text2);margin-left:auto">${skippedWords.length} 个词</span>
      </div>
      <div class="review-list">`;
    skippedWords.forEach(item=>{
      h+=`<div class="review-item glass">
        <div class="word">${item.word}${item.info?` <span style="color:var(--text2);font-size:12px">${item.info.chinese}</span>`:''}</div>
        <div style="font-size:11px;color:var(--text2);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:8px">跳过 ${item.count} 次</div>
        <button class="btn btn-sm btn-secondary" onclick="practiceError('${item.word}')">练习</button>
        <button class="btn btn-sm btn-danger" onclick="clearError('${item.word}')">清除</button>
      </div>`;
    });
    h+='</div></div>';
  }
  c.innerHTML=h;
}

function practiceError(word){let cat=null,wObj=null;VOCAB.forEach(c=>c.words.forEach(w=>{if(w.word===word){cat=c;wObj=w}}));if(cat&&wObj){currentCategory=cat;currentWords=[wObj];currentIdx=0;combo=0;document.getElementById('learnTitle').textContent='错题练习';switchPage('pageLearn');showCard()}}
function clearError(word){removeError(word);renderReview()}

/* 个人中心 */
function renderProfile(){
  const score=getScore(),streak=getStreak();
  const totalMastered=VOCAB.reduce((s,c)=>s+getMastered(c.id).length,0);
  const totalWords=VOCAB.reduce((s,c)=>s+c.words.length,0);
  const level=Math.floor(score/100)+1;
  document.getElementById('profileLevel').textContent=`Lv.${level}`;
  document.getElementById('profileStats').innerHTML=`
    <div class="stat-card glass"><div class="val" style="color:var(--accent)">${score}</div><div class="label">总积分</div></div>
    <div class="stat-card glass"><div class="val" style="color:var(--accent3)">${totalMastered}/${totalWords}</div><div class="label">已掌握</div></div>
    <div class="stat-card glass"><div class="val" style="color:var(--accent4)">${streak}天</div><div class="label">连续打卡</div></div>`;
  const badges=[
    {icon:'🌱',name:'初学者',desc:'完成首次学习',earned:totalMastered>0},
    {icon:'🔥',name:'连续3天',desc:'打卡3天不间断',earned:streak>=3},
    {icon:'📖',name:'学者',desc:'掌握20个单词',earned:totalMastered>=20},
    {icon:'🏆',name:'大师',desc:'掌握全部单词',earned:totalMastered>=totalWords},
    {icon:'💎',name:'百分俱乐部',desc:'积分达到100',earned:score>=100},
    {icon:'👑',name:'千分王者',desc:'积分达到1000',earned:score>=1000}
  ];
  let bh='';badges.forEach(b=>{bh+=`<div class="badge-card${b.earned?' earned':''}"><div class="icon">${b.earned?b.icon:'🔒'}</div><div class="name">${b.name}</div><div class="desc">${b.desc}</div></div>`});
  document.getElementById('badgeGrid').innerHTML=bh;
  document.getElementById('dailyTasks').innerHTML='';
}
